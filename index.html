<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Renatus Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/map/favicon.png">
  <link rel="shortcut icon" type="image/x-icon" href="/map/favicon.ico">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />


  <style>
    html, body {
      margin: 0;
      height: 100dvh;
      background: #00000000;
      overflow: hidden;
    }

    #overlay-buttons {
      pointer-events: auto;
      z-index: 9999;
    }

    #btn-grid {
      pointer-events: auto;
      cursor: pointer;
      z-index: 9999;
    }

    #category-info-box {
      position: absolute;
      top: 27%;
      left: 2.2%;
      width: 16dvh;
      background: rgba(0, 0, 0, 0);
      color: rgba(171, 255, 171, 0.548);
      padding: 1dvh;
      font-family: 'Courier New', monospace;
      border-radius: 0.5dvh;
      font-size: 2.4dvh;
      z-index: 201;
      pointer-events: none;
      text-transform: uppercase;
      text-align: center;
    }

    #category-info-box span {
      display: block;
      font-size: 1.7dvh;
      font-weight: normal;
      text-transform: none;
      margin-top: 1.6dvh;
      text-align: left;
    }

    #category-info-box.align-left span {
      text-align: left;
      padding-left: 0.6dvh;
    }

    #category-info-box.align-right span {
      text-align: right;
      padding-right: 0.6dvh;
    }

    #control-panel-wrapper {
      position: fixed;
      top: 0;
      left: 50%;
      height: 100dvh;
      transform: translateX(-50%);
      z-index: 0;
      pointer-events: none;
    }

    #control-panel-base {
      height: 100dvh;
    }

    #tv-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100dvh;
      height: 100dvh;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
      background: url('tv-frame.png') center center no-repeat;
      background-size: contain;
    }
    
    #gap-fix-overlay {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 100dvh;
      pointer-events: none;
      z-index: 99999;
      background-size: contain;
    }

    #floating-labels {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99999;
    }

    .floating-label {
      position: absolute;
      color: #c0ffc0;
      font-family: 'Courier New', monospace;
      font-size: 2dvh;
      white-space: nowrap;
      text-shadow:
        0 0 2px #7fff7f,
        0 0 6px #aaffaa,
        0 0 12px #c0ffc0,
        0 0 18px #c0ffc0,
        0 0 24px #e0ffe0;
      pointer-events: none;
      z-index: 99999;
    }

      #background {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vw;
      height: 100vw;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
      background: url('background.png') center center no-repeat;
      background-size: contain;
    }
    #map-container {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100dvh;
      height: 100dvh;
      transform: translate(-50%, -50%);
      max-width: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      opacity: 0;
      transition: opacity 1s ease-in;
      display: none;
      z-index: 1;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
      background: transparent;
      position: relative;
    }

    #background-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('tv-background.png') center center no-repeat;
      background-size: cover;
      z-index: 0;
      pointer-events: none;
    }

    #btn-rp-mode-hitbox {
      position: absolute;
      top: 9%;
      left: 8.4%;
      width: 7dvh;
      height: 6dvh;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: auto;
      z-index: 9999;
      overflow: visible;

    } 

    #btn-rp-mode-toggle {
      position: absolute;
      top: 50%;
      left: 50%;
      height: 5dvh;
      width: auto;
      transform: translate(-48%, -54%) scale(2.5);
      pointer-events: none;
      opacity: 1 !important;
    }

    #rotate-warning {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.96);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999999;
      pointer-events: all;
    }

    .rotate-warning-inner {
      text-align: center;
      color: #c0ffc0;
      font-family: 'Courier New', monospace;
      text-shadow:
        0 0 2px #7fff7f,
        0 0 6px #aaffaa,
        0 0 12px #c0ffc0;
      padding: 3dvh;
    }

    .rotate-icon {
      font-size: 8dvh;
      line-height: 1;
      margin-bottom: 2dvh;
      animation: rotatePrompt 1.8s ease-in-out infinite;
    }

    .rotate-text {
      font-size: 2.4dvh;
      line-height: 1.5;
    }

    @keyframes rotatePrompt {
      0%   { transform: rotate(0deg) scale(1); opacity: 0.7; }
      25%  { transform: rotate(0deg) scale(1.05); opacity: 1; }
      50%  { transform: rotate(90deg) scale(1.1); opacity: 1; }
      75%  { transform: rotate(90deg) scale(1.05); opacity: 1; }
      100% { transform: rotate(0deg) scale(1); opacity: 0.7; }
    }


    #coord-input {
      position: absolute;
      top: 43.1%;
      left: 91.7%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0);
      width: 18dvh;
      height: 3.8dvh;
      vertical-align: middle;
      font-size: 3.8dvh;
      padding: 0dvh;
      border-radius: 0.8dvh;
      font-family: 'Courier New', monospace;
      font-size: 1.8dvh;
      z-index: 9999;
      pointer-events: auto;
    }

    #coord-input input {
      width: 18dvh;
      height: 3.8h;
      font-size: 1.4dvh;
      font-family: 'Courier New', monospace;
      background: none;
      border: none;
      color: rgba(171, 255, 171, 0.74);
      outline: none;
      text-align: center;
      box-sizing: border-box;

      padding-top: 1dvh;
      padding-bottom: 0.2dvh;
      line-height: normal;
    }
    
    #control-panel-sticker {
      position: absolute;
      top: 74%;
      left: 1%;
      height: 25dvh;
      width: auto;
      pointer-events: none;
      z-index: 150;
      transform: rotate(-10deg);
      filter: brightness(0.9)
    }

    #service-date {
      position: absolute;
      top: 17%;
      right: 1.5%;
      height: 3.5dvh;
      mix-blend-mode: hard-light;
      opacity: 0.8;
      width: auto;
      pointer-events: none;
      z-index: 1;
    }

    #map-container.grayscale {
      filter: grayscale(100%) contrast(150%);
    }

    #coord-input input::placeholder {
      color: #c0ffc0;
      opacity: 0.7;
    }

    #map-container.rainbow-mode {
      animation: rainbowShift 8s linear infinite;
      filter: hue-rotate(0deg);
    }

    @keyframes rainbowShift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    @keyframes topoPulse {
      0%   { opacity: 0.50; }
      50%  { opacity: 0.30; }
      100% { opacity: 0.50; }
    }
    .leaflet-topography-pulse {
      animation: topoPulse 2.5s ease-in-out infinite;
    }
        #overlay-buttons {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      z-index: 200;
    }

    .map-toggle-btn {
      position: absolute;
      width: 4dvh;
      height: 4dvh;
      pointer-events: auto;
      transition: opacity 0.3s ease;
      cursor: pointer;
      opacity: 0.5;
    }

    .layer-toggle {
      width: 6.25dvh;
      height: 2.5dvh;
      opacity: 1;
    }

    .dummy-button {
      pointer-events: none;
      opacity: 1;
    }

    .onoff-toggle {
      opacity: 0.8 !important;
      height: 6.2dvh;
      width: auto;
      transform-origin: center center;
    }

    #btn-map-toggle {
      opacity: 1;
    }

    * {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .status-light {
      position: absolute;
      width: 4dvh;
      height: 4dvh;
      pointer-events: none;
    }
    #btn-grid {
      pointer-events: auto;
      cursor: pointer;
      z-index: 9999;
    }
    #btn-map-toggle { top: 82.5%; left: 90.52%; transform: scale(4); }
    #status-light   { top: 6.7%; left: 90.22%; pointer-events: none; transform: scale(2.6); }

    .pulse-marker {
      position: absolute;
      width: 20px;
      height: 20px;
      position: absolute;
      background: #c0ffc0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
    }

    .map-text-label {
      font-family: 'Courier New', monospace;
      color: #ffffff;
      font-size: 1.6dvh;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
      -webkit-text-stroke: 4px #000;
      paint-order: stroke fill;
      text-shadow:
        0 0 2px  #7fffee,
        0 0 6px  #7fffee,
        0 0 12px #aaffff,
        0 0 24px #c0ffff,
        0 0 40px #c0ffff,
        0 0 70px #c0ffff;
      z-index: 9999;
      text-align: center;
      white-space: nowrap;
      position: relative;
    }
    .map-text-label {
      position: relative;
    }

    .map-text-label .label-inner {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      white-space: nowrap;
    }
    .clear {
      height: 10dvh;
      width: auto;
      opacity: 0.8 !important;
    }

    .pulse-marker::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      background: #c0ffc0;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 1.5s ease-out infinite;
    }

    .faint-marker {
      width: 8px;
      height: 8px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid white;
      border-radius: 50%;
      pointer-events: none;
      position: absolute;
    }

    .numpad-btn {
      width: 5.2dvh;
      height: auto;
      cursor: pointer;
      opacity: 1 !important;
    }

    .mode-toggle {
      height: 5dvh;
      width: auto;
      opacity: 1 !important;
    }

    .color-dodge-overlay {
      mix-blend-mode: color-dodge;
      pointer-events: none;
    }

    .color-multiply-overlay {
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .category-light {
      width: 2.2dvh;
      height: 2.2dvh;
      pointer-events: none;
      z-index: 9999;
    }

    .mode-light {
      width: 2.2dvh;
      height: 2.2dvh;
      pointer-events: none;
      z-index: 9999;
    }
    .measure-toggle {
      width: 16dvh;
      height: auto;
      opacity: 1 !important;
    }
    .leaflet-control-measure .leaflet-control-measure-toggle,
    .leaflet-control-measure .leaflet-control-measure-interaction {
      display: none !important;
    }
    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.8;
      }
      100% {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    .map-text-label.region-label {
      color: #fff;
      font-size: 2.6dvh;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      -webkit-text-stroke: 6px #000;
      paint-order: stroke fill;
      text-shadow:       
        0 0 2px  #fff,
        0 0 6px  #fff,
        0 0 12px #fff,
        0 0 24px #fff,
        0 0 40px #fff,
        0 0 70px #fff,
        0 0 110px #fff;

      z-index: 99998;

      }


    #discord-button {
      position: fixed;
      bottom: 2vh;
      right: 2vh;
      z-index: 999999;
      display: block;
      height: 4vh !important;
      width: auto;
      transition: transform 0.2s ease;
      pointer-events: auto;
    }
    #discord-button img {
      height: 4vh;
      width: auto;
      display: block;
    }
    #discord-button:hover {
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div id="control-panel-wrapper">
    <img id="control-panel-base" src="control-panel-base.png" alt="" />

    <div id="overlay-buttons">

      <div id="tickle-counter" style="position: absolute; top: 49%; left: 9.5%;  width: 6dvh; height: auto; color: rgba(171, 255, 171, 0.548); font-family: 'Courier New', monospace; font-size: 1.5dvh; text-align: right; white-space: nowrap; overflow: hidden; pointer-events: none; z-index: 9999; display: none;">0</div>

      <div id="standard-controls">
        <!-- Category: Zones -->
        <img src="button-a.png" id="btn-cat-zones" class="map-toggle-btn category-toggle" data-category="cat-zones" data-state="off"  style="top: 59.1%; left: 3%; opacity: 1;" draggable="false" />
        <img src="indicator-off.png" id="light-cat-zones" class="status-light category-light"  style="top: 59.9%; left: 6.1%;" draggable="false" />

        <!-- Category: Environment -->
        <img src="button-b.png" id="btn-cat-env" class="map-toggle-btn category-toggle" data-category="cat-env" data-state="off"  style="top: 67.1%; left: 3%; opacity: 1;" draggable="false" />

        <!-- Category: Manmade -->
        <img src="button-c.png" id="btn-cat-manmade" class="map-toggle-btn category-toggle" data-category="cat-manmade" data-state="off" style="top: 63.1%; left: 3%; opacity: 1;" draggable="false" />
        <img src="indicator-off.png" id="light-cat-manmade" class="status-light category-light" style="top: 63.9%; left: 6.1%;" draggable="false" />

        <!-- Category: Traversal -->
        <img src="button-d.png" id="btn-cat-traversal" class="map-toggle-btn category-toggle" data-category="cat-traversal" data-state="off" style="top: 71.1%; left: 3%; opacity: 1;" draggable="false" />
        <img src="indicator-off.png" id="light-cat-traversal" class="status-light category-light"  style="top: 71.9%; left: 6.1%;" draggable="false" />

        <!-- Category: Labels -->
        <img src="button-e.png" id="btn-cat-labels" class="map-toggle-btn category-toggle" data-category="cat-labels" data-state="off"  style="top: 55.1%; left: 3%; opacity: 1;" draggable="false" />
        <img src="indicator-off.png" id="light-cat-labels" class="status-light category-light"  style="top: 55.9%; left: 6.1%;" draggable="false" />

        <div id="cat-zones" class="overlay-category" style="display:none;">
          <img src="layerbutton-off.png" id="btn-patrol" class="map-toggle-btn layer-toggle" data-state="off" style="top: 55.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-migration" class="map-toggle-btn layer-toggle" data-state="off" style="top: 59.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-sanctuary" class="map-toggle-btn layer-toggle" data-state="off" style="top: 63.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-spawns" class="map-toggle-btn layer-toggle" data-state="off" style="top: 67.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" class="map-toggle-btn layer-toggle dummy-button" style="top: 71.8%; left: 10%;" draggable="false"/>
        </div>

        <div id="cat-env" class="overlay-category" style="display:none;">
          <img src="layerbutton-off.png" id="btn-water" class="map-toggle-btn layer-toggle" data-state="off" style="top: 55.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-salt" class="map-toggle-btn layer-toggle" data-state="off" style="top: 59.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-mud" class="map-toggle-btn layer-toggle" data-state="off" style="top: 63.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-slipstreams" class="map-toggle-btn layer-toggle" data-state="off" style="top: 67.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" class="map-toggle-btn layer-toggle dummy-button" style="top: 71.8%; left: 10%;" draggable="false"/>

        </div>

        <div id="cat-traversal" class="overlay-category" style="display:none;">

          <img src="layerbutton-off.png" id="btn-fauna" class="map-toggle-btn layer-toggle" data-state="off" style="top: 59.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-assets" class="map-toggle-btn layer-toggle" data-state="off" style="top: 63.8%; left: 10%;" draggable="false"/>

          <img src="layerbutton-off.png" class="map-toggle-btn layer-toggle dummy-button" style="top: 71.8%; left: 10%;" draggable="false"/>

        <div id="cat-labels" class="overlay-category" style="display:none;">
          <img src="layerbutton-off.png" id="btn-lakes" class="map-toggle-btn layer-toggle" data-state="off" style="top: 67.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" id="btn-regions" class="map-toggle-btn layer-toggle" data-state="off" style="top: 55.8%; left: 10%;" draggable="false"/>

          <img src="layerbutton-off.png" id="btn-landmarks" class="map-toggle-btn layer-toggle" data-state="off" style="top: 63.8%; left: 10%;" draggable="false"/>

          <img src="layerbutton-off.png" class="map-toggle-btn layer-toggle dummy-button" style="top: 55.8%; left: 10%;" draggable="false"/>

          <img src="layerbutton-off.png" class="map-toggle-btn layer-toggle dummy-button" style="top: 63.8%; left: 10%;" draggable="false"/>
          <img src="layerbutton-off.png" class="map-toggle-btn layer-toggle dummy-button" style="top: 67.8%; left: 10%;" draggable="false"/>

        </div>
      </div>
      <div id="rp-controls" style="display: none;">
        <!-- RP Category: A -->
        <img src="button-e.png" id="btn-rp-cat-a" class="map-toggle-btn rp-category-toggle" data-category="rp-cat-a" data-state="off" style="top: 55.1%; left: 3%; opacity: 1;" draggable="false" />
        <img src="indicator-off.png" id="light-rp-cat-a" class="status-light category-light rp-category-light" style="top: 55.9%; left: 6.1%;" draggable="false" />

        <!-- RP Category: B -->
        <img src="button-a.png" id="btn-rp-cat-b" class="map-toggle-btn rp-category-toggle" data-category="rp-cat-b" data-state="off" style="top: 59.1%; left: 3%; opacity: 1;" draggable="false" />
        <img src="indicator-off.png" id="light-rp-cat-b" class="status-light category-light rp-category-light" style="top: 59.9%; left: 6.1%;" draggable="false" />

        <!-- RP Category: C -->
        <img src="button-c.png" id="btn-rp-cat-c" class="map-toggle-btn rp-category-toggle" data-category="rp-cat-c" data-state="off" style="top: 63.1%; left: 3%; opacity: 1;" draggable="false" />

      const mapHeightInPixels = window.innerHeight * (maxHeightInDvh / 100);

      return (

        window.matchMedia("(pointer: coarse)").matches
      );
    }

    function checkOrientation() {
      const rotateWarning = document.getElementById("rotate-warning");
      if (!rotateWarning) return;

      const mobile = isMobileLikeDevice();
      const portrait = window.innerHeight > window.innerWidth;

      if (mobile && portrait) {
        rotateWarning.style.display = "flex";
      } else {
        rotateWarning.style.display = "none";
      }
    }

    async function tryLockLandscape() {
      if (!isMobileLikeDevice()) return;
      if (!screen.orientation || !screen.orientation.lock) return;
      if (window.innerWidth >= window.innerHeight) {
        try {
          await screen.orientation.lock("landscape");
        } catch (e) {
          // ignored: unsupported or blocked by browser
        }
      }
    }

    window.addEventListener("load", () => {
      checkOrientation();

      const firstInteraction = async () => {
        await tryLockLandscape();
        checkOrientation();
      };

      document.addEventListener("click", firstInteraction, { once: true });
      document.addEventListener("touchstart", firstInteraction, { once: true });
    });

    function catmullRomSpline(points, segments = 16) {
      if (points.length < 2) return [];

      const curve = [];
      for (let i = 0; i < points.length - 1; i++) {
        const p0 = points[i - 1] || points[i];
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2] || p2;

        for (let j = 0; j < segments; j++) {
          const t = j / segments;
          const t2 = t * t;
          const t3 = t2 * t;

          const lat =
            0.5 * (
              (2 * p1.lat) +
              (-p0.lat + p2.lat) * t +
              (2 * p0.lat - 5 * p1.lat + 4 * p2.lat - p3.lat) * t2 +
              (-p0.lat + 3 * p1.lat - 3 * p2.lat + p3.lat) * t3
            );

          const lng =
            0.5 * (
              (2 * p1.lng) +
              (-p0.lng + p2.lng) * t +
              (2 * p0.lng - 5 * p1.lng + 4 * p2.lng - p3.lng) * t2 +
              (-p0.lng + 3 * p1.lng - 3 * p2.lng + p3.lng) * t3
            );

          curve.push([lat, lng]);
        }
      }

      curve.push([points[points.length - 1].lat, points[points.length - 1].lng]);
      return curve;
    }

      function updateFloatingLabels() {
        const size = map.getSize();
        const clamp = (v, a, b) => Math.min(Math.max(v, a), b);

        const base = Math.min(size.x, size.y);
        const inset = Math.round(clamp(base * 0.04, 15, 75));

        const padX = inset;
        const padY = inset;
        const insetX = inset;
        const insetY = inset;

        const west = map.getBounds().getWest();
        rowLabels.forEach(({ el, lat }) => {
          const p = map.latLngToContainerPoint([lat, west]);
          const halfH = (el.offsetHeight || 0) / 2;
          const left = clamp(p.x + insetX, padX, size.x - padX);
          const top  = clamp(p.y - halfH,  padY, size.y - padY);

          el.style.left = left + 'px';
          el.style.top  = top  + 'px';
        });

        const north = map.getBounds().getNorth();
        colLabels.forEach(({ el, lng }) => {
          const p = map.latLngToContainerPoint([north, lng]);
          const halfW = (el.offsetWidth || 0) / 2;

          const left = clamp(p.x - halfW, padX, size.x - padX);

          el.style.left = left + 'px';
          el.style.top  = top  + 'px';
        });
      }

            document.getElementById('dummy-fillers').style.display = 'none';

            const desc = categoryDescriptions[catId];
            if (desc) {
              infoBox.innerHTML = `<strong>${desc.name}</strong>` + desc.layers.map(layer => `<span>${layer}</span>`).join('');
              infoBox.style.display = 'block';
              infoBox.classList.remove('default-list-mode');
              setInfoBoxAlignment("right");
            }
          }
        });
      }

      const rpCategoryButtons = {
        'btn-rp-cat-a': 'rp-cat-a',
        'btn-rp-cat-b': 'rp-cat-b',
        'btn-rp-cat-c': 'rp-cat-c',
        'btn-rp-cat-d': 'rp-cat-d',
        'btn-rp-cat-e': 'rp-cat-e',
      };

      const rpCategoryButtonImages = {
        'btn-rp-cat-a': { default: 'button-e.png', pressed: 'button-e-in.png' },
        'btn-rp-cat-b': { default: 'button-a.png', pressed: 'button-a-in.png' },
        'btn-rp-cat-c': { default: 'button-c.png', pressed: 'button-c-in.png' },
        'btn-rp-cat-d': { default: 'button-b.png', pressed: 'button-b-in.png' },
        'btn-rp-cat-e': { default: 'button-d.png', pressed: 'button-d-in.png' },
      };

      const rpCategoryDescriptions = {
        'rp-cat-a': { name: 'ERROR1', layers: ['Error1-1', 'Error1-2', 'Error1-3'] },
        'rp-cat-b': { name: 'ERROR2', layers: ['Error2-1', 'Error2-2', 'Error2-3'] },
        'rp-cat-c': { name: 'ERROR3', layers: ['Error3-1', 'Error3-2', 'Error3-3'] },
        'rp-cat-d': { name: 'ERROR4', layers: ['Error4-1', 'Error4-2', 'Error4-3'] },
        'rp-cat-e': { name: 'ERROR5', layers: ['Error5-1', 'Error5-2', 'Error5-3'] }
      };

      for (const [btnId, catId] of Object.entries(rpCategoryButtons)) {
        const btn = document.getElementById(btnId);
        if (!btn) continue;

        btn.addEventListener('click', () => {
          const isOn = btn.dataset.state === "on";
          const clickSound = document.getElementById('click-sound');
          clickSound.currentTime = 0;
          clickSound.play();

          const imgSet = rpCategoryButtonImages[btnId];
          if (imgSet) {
            pressButtonImage(btn, imgSet.pressed, imgSet.default, 150);
          }

          if (!mapVisible) return;

          const cat = document.getElementById(catId);
          const light = document.getElementById(`light-${catId}`);
          const infoBox = document.getElementById('category-info-box');

          document.querySelectorAll('#rp-controls .rp-overlay-category').forEach(div => div.style.display = 'none');

          if (isOn) {
            btn.dataset.state = "off";
            if (light) light.src = "indicator-off.png";
            document.getElementById('rp-dummy-fillers').style.display = 'block';
            infoBox.innerHTML = rpDefaultInfoContent;
            infoBox.style.display = 'block';
            setInfoBoxAlignment("left");
          } else {
            document.querySelectorAll('#rp-controls .rp-category-toggle').forEach(otherBtn => {
              otherBtn.dataset.state = "off";
            });
            document.querySelectorAll('#rp-controls .rp-category-light').forEach(lightEl => {
              lightEl.src = "indicator-off.png";
            });

            btn.dataset.state = "on";
            if (light) light.src = "indicator-on.png";

            cat.style.display = 'block';
            document.getElementById('rp-dummy-fillers').style.display = 'none';

            const desc = rpCategoryDescriptions[catId];
            if (desc) {
              infoBox.innerHTML = `<strong>${desc.name}</strong>` + desc.layers.map(layer => `<span>${layer}</span>`).join('');
              infoBox.style.display = 'block';
              setInfoBoxAlignment("right");
            }
          }
        });
      }


      const btnMapOn = document.getElementById('btn-map-on');
      const btnMapOff = document.getElementById('btn-map-off');

      btnMapOn.addEventListener('click', () => {
        pressButtonImage(btnMapOn, 'switch-on-in.png', 'switch-on.png');
        toggleMap(true);
      });

      btnMapOff.addEventListener('click', () => {
        pressButtonImage(btnMapOff, 'switch-off-in.png', 'switch-off.png');
        toggleMap(false);
      });

      const soundOn = document.getElementById('sound-on');
      const soundOff = document.getElementById('sound-off');
      soundOn.volume = 1.0;
      soundOff.volume = 1.0;
      const statusLight = document.getElementById('status-light');
      const mapContainer = document.getElementById('map-container');

      function toggleMap(turnOn) {
        if (turnOn === mapVisible) return;
        mapVisible = turnOn;
        if (turnOn) {
          document.getElementById('coord-input').style.display = 'block';
          mapContainer.style.display = 'block';
          coordInputField.value = '';
          setTimeout(() => {
            mapContainer.style.opacity = '1';
            map.invalidateSize();

            setMinZoomToFitViewport(100);

            const startZoom = map.getMinZoom() + 0.3;

            map.setView(desiredCenter, startZoom, { animate: false });

          }, 10);

          if (btnGrid.dataset.state === "on") {
            gridLayerGroup.addTo(map);
            document.getElementById('light-grid').src = "indicator-on.png";
          }

          if (btnTopoMode.dataset.state === "on") {
            topographyLayer.addTo(map);
            document.getElementById('light-topo').src = "indicator-on.png";
          }

          if (btnBase1.dataset.state === "on") {
            base1Layer.addTo(map);
            document.getElementById('light-base1').src = "indicator-on.png";
          }

          if (btnContrastMode.dataset.state === "on") {
            mapContainer.classList.add('grayscale');
            document.getElementById('light-contrast').src = "indicator-on.png";
          }

          soundOn.currentTime = 0;
          soundOn.play();
          document.getElementById('tickle-counter').style.display = 'block';
          statusLight.src = 'light-on.png';

          updateRpModeVisuals();
          refreshControlSet();
        } else {
          document.getElementById('coord-input').style.display = 'none';
          mapContainer.style.opacity = '0';
          setTimeout(() => {
            mapContainer.style.display = 'none';
          }, 300);

          const gif = document.getElementById('easteregg-gif');
          gif.style.opacity = '0';
          gif.style.display = 'none';
          easterEggVisible = false;
          document.getElementById('tickle-counter').style.display = 'none';

          soundOff.currentTime = 0;
          soundOff.play();
          stopCustomMeasuring();
          statusLight.src = 'light-off.png';

          document.querySelectorAll('.category-light').forEach(light => {
            light.src = "indicator-off.png";
          });

          document.querySelectorAll('.mode-light').forEach(light => {
            light.src = "indicator-off.png";
          });

          document.querySelectorAll('.layer-toggle').forEach(btn => {
            btn.src = "layerbutton-off.png";
            btn.dataset.state = "off";
          });

          Object.values(toggleableLayers).forEach(layer => {
            if (map.hasLayer(layer)) {
              map.removeLayer(layer);
            }
          });

          document.querySelectorAll('#standard-controls .overlay-category').forEach(div => div.style.display = 'none');
          document.getElementById('dummy-fillers').style.display = 'block';

          const infoBox = document.getElementById('category-info-box');
          infoBox.innerHTML = '';
          infoBox.style.display = 'none';

          updateRpModeVisuals();
          refreshControlSet();
        }
      }


      window.addEventListener('resize', () => {
        if (mapVisible) {
          setMinZoomToFitViewport(100);
        }

      const gif = document.getElementById('easteregg-gif');
      gif.style.opacity = '0';
      gif.style.display = 'none';
      easterEggVisible = false;
      window.eastereggGif = gif; 
      });

      let customMeasureActive = false;
      let customLine = null;
      let customDistance = 0;
      let curvedPoints = [];
      let smoothCurveLayer = null;
      let startMarker = null;
      let endMarker = null;
      const measureDisplay = document.getElementById('measure-display');

      function createEndpointMarker(latlng) {
        return L.circleMarker(latlng, {
          radius: 4,
          color: '#ffffff',
          fillColor: '#ffffff',
          fillOpacity: 1,
          weight: 1,
          pane: 'measure'
        }).addTo(map);
      }

      function updateEndpointMarkers() {
        if (curvedPoints.length === 0) return;

        const start = curvedPoints[0];
        const end = curvedPoints[curvedPoints.length - 1];

        if (!startMarker) {
          startMarker = createEndpointMarker(start);
        } else {
          startMarker.setLatLng(start);
        }

        // Always update or recreate endMarker
        if (endMarker) {
          map.removeLayer(endMarker);
        }
        endMarker = createEndpointMarker(end);
      }

      function startCustomMeasuring() {
        customMeasureActive = true;
        customLine = L.featureGroup().addTo(map);


        customPoints = [];
        customDistance = 0;
        curvedPoints = [];
        smoothCurveLayer = null;
        measureDisplay.innerText = "Click to measure";
        measureDisplay.style.display = "block";
      }

      function clearCoordPath() {
        coordPathPoints = [];
        coordLayerGroup.clearLayers();
        coordPathLayer = null;
        markerLayer = null;
      }

      function stopCustomMeasuring() {
        customMeasureActive = false;
        if (customLine) map.removeLayer(customLine);
        customLine = null;
        customDistance = 0;
        curvedPoints = [];
        if (smoothCurveLayer) {
          map.removeLayer(smoothCurveLayer);
          smoothCurveLayer = null;
        }
        measureDisplay.style.display = "none";

        if (startMarker) {
          map.removeLayer(startMarker);
          startMarker = null;
        }
        if (endMarker) {
          map.removeLayer(endMarker);
          endMarker = null;
        }
      }

      map.on('click', function (e) {
        if (!customMeasureActive) return;

        const latlng = e.latlng;
        curvedPoints.push(latlng);

        const smoothLatLngs = catmullRomSpline(curvedPoints);

        if (smoothCurveLayer) {
          customLine.removeLayer(smoothCurveLayer);
        }

        smoothCurveLayer = L.polyline(smoothLatLngs, {
          color: '#ffffff',
          weight: 2.5,
          opacity: 0.9,
          dashArray: '6,4',
          interactive: false,
          pane: 'measure'
        }).addTo(customLine);

        if (curvedPoints.length > 1) {
          const prev = curvedPoints[curvedPoints.length - 2];
          const pixelDist = map.distance(prev, latlng);
          const meters = pixelDist * 3.11084;
          customDistance += meters;

          if (customDistance >= 1000) {
            measureDisplay.innerText = `${(customDistance / 1000).toFixed(2)} km`;
          } else {
            measureDisplay.innerText = `${customDistance.toFixed(1)} m`;
          }

          updateEndpointMarkers();
        }
      });
      document.addEventListener('keydown', (e) => {
        if (!customMeasureActive) return;

        if (e.ctrlKey && e.key === 'z') {
          e.preventDefault();

          if (curvedPoints.length > 0) {
            const removed = curvedPoints.pop();

            if (smoothCurveLayer) {
              customLine.removeLayer(smoothCurveLayer);
              smoothCurveLayer = null;
            }

            if (curvedPoints.length >= 2) {
              const smoothLatLngs = catmullRomSpline(curvedPoints);
              smoothCurveLayer = L.polyline(smoothLatLngs, {
                color: '#ffffff',
                weight: 2.5,
                opacity: 0.9,
                dashArray: '6,4',
                interactive: false
              }).addTo(customLine);
            }

            if (curvedPoints.length > 0) {
              const prev = curvedPoints[curvedPoints.length - 1];
              const dist = map.distance(prev, removed) * 3.11084;
              customDistance -= dist;

              if (customDistance >= 1000) {
                measureDisplay.innerText = `${(customDistance / 1000).toFixed(2)} km`;
              } else {
                measureDisplay.innerText = `${customDistance.toFixed(1)} m`;
              }
            } else {
              measureDisplay.innerText = `Click to measure`;
            }
            if (curvedPoints.length === 0) {
              measureDisplay.innerText = `Click to measure`;

              if (startMarker) {
                map.removeLayer(startMarker);
                startMarker = null;
              }
              if (endMarker) {
                map.removeLayer(endMarker);
                endMarker = null;
              }
            }
            updateEndpointMarkers();
          }
        }
      });

      document.addEventListener('keydown', (e) => {
        const clickSound = document.getElementById('click-sound');
        const coordInputField = document.getElementById('coord-full');

        if (!mapVisible) return;

        if (e.key === ' ' && document.activeElement === document.body) {
          e.preventDefault();
        }

        if ((e.key >= '0' && e.key <= '9') || e.code.startsWith('Numpad')) {
          const digit = e.key;
          if (digit >= '0' && digit <= '9') {
            const btn = document.querySelector(`.numpad-btn[data-num="${digit}"]`);
            if (btn) {
              clickSound.currentTime = 0;
              clickSound.play();
              pressButtonImage(btn, btn.src.replace('.png', '-in.png'), btn.src, 150);

              if (document.activeElement !== coordInputField) {
                coordInputField.value += digit;
              }
            }
          }
        }

        if (e.key === ' ') {
          const btn = document.getElementById('btn-numpad-space');
          clickSound.currentTime = 0;
          clickSound.play();
          pressButtonImage(btn, btn.src.replace('.png', '-in.png'), btn.src, 150);

          if (document.activeElement !== coordInputField) {
            coordInputField.value += ' ';
          }
        }

        if (e.key === 'Enter') {
          const btn = document.getElementById('btn-numpad-confirm');
          clickSound.currentTime = 0;
          clickSound.play();
          pressButtonImage(btn, btn.src.replace('.png', '-in.png'), btn.src, 150);

          if (document.activeElement !== coordInputField) {
            gotoCoord();
            coordInputField.value = '';
          }
        }

        if (e.key === 'Escape') {
          const btn = document.getElementById('btn-numpad-clear');
          clickSound.currentTime = 0;
          clickSound.play();
          pressButtonImage(btn, btn.src.replace('.png', '-in.png'), btn.src, 150);

          clearCoordPath();
          coordInputField.value = '';

        }

        if (e.key === 'Backspace') {
          if (document.activeElement !== coordInputField) {
            coordInputField.value = coordInputField.value.slice(0, -1);
          }
        }
      });

      updateRpModeVisuals();
      refreshControlSet();
    });

    let markerLayer = null;

    function parsePlayerCoord(input) {
      const raw = input.trim();
      const europeanPattern = /(\d{1,3}(?: \d{3})+,\d+)/;

      if (europeanPattern.test(raw)) {
        const normalized = raw
          .replace(/ /g, '')
          .replace(/,/g, '.');

        const matches = normalized.match(/-?\d+(\.\d+)?/g);

        if (!matches || matches.length < 2) {
          alert('Invalid coordinate format (EU-style).');
          return null;
        }

        return {
          x: parseFloat(matches[0]),
          y: parseFloat(matches[1]),
        };
      }

      const standard = raw.replace(/,/g, '');
      const matches = standard.match(/-?\d+(\.\d+)?/g);

      if (!matches || matches.length < 2) {
        alert('Invalid coordinate format.');
        return null;
      }

      return {
        x: parseFloat(matches[0]),
        y: parseFloat(matches[1]),
      };
    }

    function gotoCoord() {
      const input = document.getElementById('coord-full').value.trim().toUpperCase();

      if (input === "505") return toggleGoreOverlay();
      if (input === "PR1D3") return activateRainbowMode();
      if (input === "80085") return toggleEasterEggGif();

      const parsed = parsePlayerCoord(input);
      if (!parsed) return;

      const pxX = 0.0000360393635 * parsed.x + 0.00332053474 * parsed.y + 2037.66808;
      const pxY = 0.00332005842  * parsed.x + 0.000059369481 * parsed.y + 2029.32022;

      const latlng = L.latLng(mapSize - pxY, pxX);

      if (coordPathPoints.length >= 1) {
        const prev = coordPathPoints[coordPathPoints.length - 1];

        if (coordPathPoints.length > 1) {
          coordLayerGroup.addLayer(L.circleMarker(prev, {
            radius: 2.5,
            color: '#c0ffc0',
            fillColor: '#c0ffc0',
            fillOpacity: 0.2,
            weight: 1,
            pane: 'measure'
          }));
        }

        if (coordPathPoints.length === 1) {
          coordLayerGroup.addLayer(L.circleMarker(prev, {
            radius: 4,
            color: '#c0ffc0',
            fillColor: '#c0ffc0',
            fillOpacity: 1,
            weight: 1,
            pane: 'measure'
          }));
        }
      }

      coordPathPoints.push(latlng);

      if (coordPathPoints.length >= 2) {
        if (coordPathLayer) {
          coordLayerGroup.removeLayer(coordPathLayer);
        }

        coordPathLayer = L.polyline(coordPathPoints, {
          color: '#c0ffc0',
          weight: 2.5,
          opacity: 0.9,
          dashArray: '6,4',
          interactive: false,
          pane: 'measure'
        });

        coordLayerGroup.addLayer(coordPathLayer);
      }

      if (markerLayer) {
        coordLayerGroup.removeLayer(markerLayer);
      }

      markerLayer = L.marker(latlng, {
        icon: L.divIcon({
          className: 'pulse-marker',
          iconSize: [20, 20],
          iconAnchor: [10, 10]
        }),
        pane: 'measure'
      });

      coordLayerGroup.addLayer(markerLayer);

      map.setView(latlng, map.getZoom());
    }



    document.getElementById('coord-full').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        gotoCoord();
        this.value = '';
      }
    });

    goreOverlay = document.createElement('img');
    goreOverlay.src = 'map-gore.png';
    goreOverlay.style.position = 'fixed';
    goreOverlay.style.top = '50%';
    goreOverlay.style.left = '50%';
    goreOverlay.style.width = '100dvh';
    goreOverlay.style.height = '100dvh';
    goreOverlay.style.transform = 'translate(-50%, -50%)';
    goreOverlay.style.zIndex = '999999';
    goreOverlay.style.pointerEvents = 'none';
    goreOverlay.style.opacity = '0';
    goreOverlay.style.transition = 'opacity 0.8s ease-in-out';
    document.body.appendChild(goreOverlay);

    function toggleGoreOverlay() {
      goreOverlayVisible = !goreOverlayVisible;

      if (goreOverlayVisible) {
        goreOverlay.style.display = 'block';
        requestAnimationFrame(() => {
          goreOverlay.style.opacity = '1';
        });
      } else {
        goreOverlay.style.opacity = '0';
        setTimeout(() => {
          goreOverlay.style.display = 'none';
        }, 800);
      }
    }

    function activateRainbowMode() {
      const mapContainer = document.getElementById('map-container');

      const isRainbow = mapContainer.classList.contains('rainbow-mode');
      mapContainer.classList.remove('rainbow-mode');
      if (!isRainbow) {
        mapContainer.classList.add('rainbow-mode');
      }
    }

    let easterEggVisible = false;

    function toggleEasterEggGif() {
      const gif = document.getElementById('easteregg-gif');

      if (!mapVisible) return;

      easterEggVisible = !easterEggVisible;

      if (easterEggVisible) {
        gif.style.display = 'block';
        requestAnimationFrame(() => {
          gif.style.opacity = '1';
        });
      } else {
        gif.style.opacity = '0';
        setTimeout(() => {
          gif.style.display = 'none';
        }, 600);
      }
    }


  </script>
